                <h3 class="card-title text-left mb-3">Mall Register</h3>

    <form style="color: white     ;" method="POST">
        {% csrf_token %}
        <div class="form-group">
            <Label>Choose Location</Label>
           <select style="color: white     ;" name="loc" id="" class="form-control">
            <option value="Select">Select</option>
            {% for i in loc %}
            <option value="{{i.id}}">{{ i.location }}</option>
            {% endfor%}

           </select>
        </div>
        <div class="form-group">
            <Label>Enter Mall Name</Label>
            <input style="color: white     ;" type="text" Required class="form-control" name="fname">
        </div>
        <div class="form-group">
            <Label>Enter User Name</Label>
            <input style="color: white     ;" type="text" class="form-control" Required name="username">

        </div>
        <div class="form-group">
            <Label>Enter Email</Label>
            <input style="color: white     ;" type="email" class="form-control" Required name="email">

        </div>
        <!-- <div class="form-group">
            <Label>Enter Latitude </Label>
            <input type="text" class="form-control" Required name="latitude">

        </div> -->
        <!-- <div class="form-group">
            <Label>Enter Longitude</Label>
            <input type="text" class="form-control" Required name="longitude">

        </div> -->
        <div class="form-group">
            <Label>Enter Password</Label>

            <input style="color: white     ;" type="password" class="form-control" Required name="password1">

        </div>
        <div class="form-group">
            <Label>Enter Confirm Password</Label>

            <input style="color: white     ;" type="password" class="form-control" Required name="password2">

        </div>

        <button type="submit" class="btn btn-primary btn-block enter-btn">Register</button>
    </form>
