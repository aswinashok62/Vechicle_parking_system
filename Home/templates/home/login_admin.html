<style>


  .overlay-form {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.6); /* Semi-transparent background */
    padding: 20px;
    border-radius: 10px;
    width: 30%; /* Default width for large screens */
}

.overlay-form .card {
    background: rgba(21, 21, 33, 0.9); /* Light background for readability */
    padding: 20px;
    border-radius: 10px;
}

/* Responsive Design */
@media (max-width: 992px) {
    .overlay-form {
        width: 50%; /* Medium screens */
    }
}

@media (max-width: 768px) {
    .overlay-form {
        width: 70%; /* Tablets */
    }
}

@media (max-width: 576px) {
    .overlay-form {
        width: 90%; /* Small screens */
    }
}


</style>
