{% extends 'admin/shared/base.html' %}

{% load static %}


{% block content %}
<div class="col-md-8 block-9 mb-md-5">
    <h2 style="color: #01d28e;" class="mb-4">Manage Locations</h2>

    <!-- Display form -->
    <form method="POST" style="color: black;">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.location.label_tag }}
            {{ form.location  }}
        </div>
       
        <button type="submit" class="btn btn-primary">Save Location</button>
    </form>

</div>


   <a class="nav-link" style="color:#00d25b" href="{% url 'view_locations' %}">
              
              <span class="menu-title">View Location</span>
            </a>
<!-- Optional: Display existing parking slots (if needed) -->


{% endblock content %}
