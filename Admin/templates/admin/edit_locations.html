{% extends 'admin/shared/base.html' %}

{% load static %}


{% block content %}
    <div class="container mt-5">
        <h2 style="color: #01d28e;" class="mb-4">Edit Locations#{{ slot.slot_number }}</h2>

        <form method="POST" style="color: black;">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.location.label_tag }}
                {{ form.location }}
            </div>
  
        

            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'view_locations' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
{% endblock content %}
