{% extends 'admin/shared/base.html' %}

{% load static %}


{% block content %}
<div style="background-image :url( '{% static "\assets\images\hom1.jpg" %}' ); height: 550px;padding: 30px;">

  <h1 style="  color: white;

    text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;">WELCOME ADMIN</h1>




  <div class="row">
    <div class="col-xl-3 col-sm-6 grid-margin stretch-card">
      <div class="card">
        <div class="card-body">
          <div class="row">
            <div class="col-9">
              <div class="d-flex align-items-center align-self-start">
                <h3 class="mb-0">{{ user_count }}</h3>
                <p class="text-success ml-2 mb-0 font-weight-medium"></p>
              </div>
            </div>
            <div class="col-3">
              <div class="icon icon-box-success ">
                <a href="{% url 'view_users' %}"><span class="mdi mdi-arrow-top-right icon-item"></span></a>

              </div>
            </div>
          </div>
          <h6 class="text-muted font-weight-normal">User Count</h6>
        </div>
      </div>
    </div>
    <div class="col-xl-3 col-sm-6 grid-margin stretch-card">
      <div class="card">
        <div class="card-body">
          <div class="row">
            <div class="col-9">
              <div class="d-flex align-items-center align-self-start">
                <h3 class="mb-0">{{ mall_count }}</h3>
                <p class="text-success ml-2 mb-0 font-weight-medium"></p>
              </div>
            </div>
            <div class="col-3">
              <div class="icon icon-box-success">
                <a href="{% url 'view_malls' %}"><span class="mdi mdi-arrow-top-right icon-item"></span></a>
              </div>
            </div>
          </div>
          <h6 class="text-muted font-weight-normal">Mall Count</h6>
        </div>
      </div>
    </div>




  </div>



</div>

<!-- <h1 style="color: #01d28e;" >WELCOME ADMIN</h1> -->
{% endblock content %}
